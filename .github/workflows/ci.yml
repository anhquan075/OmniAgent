name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install backend dependencies
        run: uv sync --project backend --group dev

      - name: Lint backend
        working-directory: backend
        run: uv run ruff check .

      - name: Test backend
        working-directory: backend
        run: uv run pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Install frontend dependencies
        run: pnpm -C frontend install --frozen-lockfile

      - name: Test frontend
        run: pnpm -C frontend test -- --run

      - name: Build frontend
        run: pnpm -C frontend build

  contract:
    name: Casper Contract
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-03-01
          targets: wasm32v1-none

      - name: Check contract
        run: cargo +nightly-2025-03-01 check --manifest-path contracts/casper-decision-proof/Cargo.toml --target wasm32v1-none

      - name: Build contract Wasm
        run: cargo +nightly-2025-03-01 build --manifest-path contracts/casper-decision-proof/Cargo.toml --release --target wasm32v1-none

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Check tracked source for obvious secrets
        run: scripts/check-secrets.sh
