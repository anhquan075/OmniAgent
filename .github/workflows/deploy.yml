name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          cd backend
          pnpm install --frozen-lockfile

      - name: Install wrangler
        run: |
          cd backend
          pnpm add -D wrangler@latest

      - name: Build
        run: |
          cd backend
          pnpm run build
          pnpm tsc functions/_worker.ts --outDir functions --module NodeNext --moduleResolution NodeNext --target ESNext --esModuleInterop --skipLibCheck

      - name: Deploy to Cloudflare Pages
        run: |
          cd backend
          npx wrangler pages deploy . --project-name omni-agent

      - name: Post Deployment URL
        run: |
          echo "🎉 Deployed to Cloudflare Pages!"
          echo "URL: https://omni-agent.pages.dev"
