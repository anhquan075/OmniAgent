name: Bug report
description: Report a reproducible issue in the Casper proof runtime or dashboard.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Keep this concise and include relevant commands or URLs.
      placeholder: |
        1. Open ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Paste logs, response snippets, transaction hashes, or screenshots.
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Casper Testnet, local dev, Railway production
    validations:
      required: true
