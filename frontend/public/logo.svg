<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="#0a1628"/>

  <!-- Shield body -->
  <path d="M100 22 L166 50 L166 104 C166 140 136 166 100 178 C64 166 34 140 34 104 L34 50 Z"
        fill="#1a2540" stroke="#f5a623" stroke-width="4.5" stroke-linejoin="round"/>

  <!-- Gold circuit traces - horizontal top -->
  <path d="M60 72 L80 72 M120 72 L140 72" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Gold circuit traces - horizontal bottom -->
  <path d="M55 130 L75 130 M125 130 L145 130" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Gold circuit traces - vertical left -->
  <path d="M60 72 L60 90 M55 130 L55 112" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Gold circuit traces - vertical right -->
  <path d="M140 72 L140 90 M145 130 L145 112" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Teal circuit nodes -->
  <circle cx="60" cy="72" r="4" fill="#00d4aa"/>
  <circle cx="140" cy="72" r="4" fill="#00d4aa"/>
  <circle cx="55" cy="130" r="4" fill="#00d4aa"/>
  <circle cx="145" cy="130" r="4" fill="#00d4aa"/>
  <circle cx="100" cy="62" r="3" fill="#f5a623"/>
  <circle cx="100" cy="138" r="3" fill="#f5a623"/>

  <!-- Outer gear ring -->
  <circle cx="100" cy="100" r="38" stroke="#2a3a5c" stroke-width="8"/>

  <!-- Gold hexagon nodes on gear ring -->
  <circle cx="100" cy="62" r="6" fill="#f5a623"/>
  <circle cx="133" cy="81" r="6" fill="#f5a623"/>
  <circle cx="133" cy="119" r="6" fill="#f5a623"/>
  <circle cx="100" cy="138" r="6" fill="#f5a623"/>
  <circle cx="67" cy="119" r="6" fill="#f5a623"/>
  <circle cx="67" cy="81" r="6" fill="#f5a623"/>

  <!-- Inner vault door -->
  <circle cx="100" cy="100" r="26" fill="#0d1c30" stroke="#3a4e72" stroke-width="3"/>

  <!-- Teal checkmark -->
  <path d="M84 100 L95 111 L118 88" stroke="#00d4aa" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left vault bolt -->
  <rect x="46" y="88" width="7" height="24" rx="3.5" fill="#6b7280"/>
  <rect x="44" y="88" width="4" height="7" rx="2" fill="#f5a623"/>
  <rect x="44" y="105" width="4" height="7" rx="2" fill="#f5a623"/>
</svg>
