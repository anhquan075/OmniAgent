services:
  - type: web
    name: omniwdk-backend
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    region: oregon # Render free tier standard region
    envVars:
      - key: DEPLOYMENT_MODE
        value: production
      - key: AGENT_CRON_SECRET
        value: 52e106571e486f8547b7428b4558fcba50a743961346b9a056957ee712ea7bc7
      - key: PORT
        value: 8000
      - key: NODE_ENV
        value: production
      # User needs to fill these in Render Dashboard after first deploy
      - key: OPENROUTER_API_KEY
        sync: false
      - key: WDK_SECRET_SEED
        sync: false
      - key: BNB_RPC_URL
        sync: false
      - key: SOLANA_RPC_URL
        sync: false
      - key: TON_RPC_URL
        sync: false
